<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Proposal Afters RSVP</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* Typography Definitions */
        @font-face {
            font-family: 'Modern Era';
            src: local('Modern Era'), local('ModernEra'), sans-serif;
        }
        @font-face {
            font-family: 'Tiempos';
            src: local('Tiempos Text'), local('TiemposHeadline'), serif;
        }

        :root {
            --primary-font: 'Modern Era', 'Helvetica Neue', sans-serif;
            --secondary-font: 'Tiempos', 'Georgia', serif;
            --bg-color: #fcfbfa; 
            --text-color: #111111;
            --border-thick: 3px solid #111111; 
        }

        body {
            font-family: var(--secondary-font);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- HEADER LOGO AREA --- */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 650px; 
            margin: 50px 0 30px 0;
        }

        .header-side {
            font-family: var(--primary-font);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            flex: 1;
        }

        .header-side-left {
            text-align: center; 
            padding-right: 10px;
        }

        .header-side-right {
            text-align: center; 
            padding-left: 10px;
        }

        .header-side .main-txt {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .header-side .sub-txt {
            font-size: 0.7rem;
            font-weight: 400;
            color: #555;
        }

        .logo-center {
            text-align: center;
            padding: 0 10px;
        }

        .logo-center img {
            max-height: 155px; 
            width: auto;
            display: block;
        }

        @media (max-width: 650px) {
            .header-container {
                flex-direction: column;
                gap: 15px;
                margin: 20px 0;
            }
        }

        /* --- HINGE-STYLE RSVP CONTAINER --- */
        .hinge-container {
            background: #ffffff;
            padding: 50px; 
            border: var(--border-thick);
            border-radius: 0px; 
            box-shadow: 6px 6px 0px #111111; 
            max-width: 650px; 
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 50px;
        }

        h1.form-header, h2.form-header { 
            font-family: var(--primary-font);
            font-weight: 700;
            font-size: 1.5rem; 
            margin-bottom: 10px; 
            text-align: left;
            text-transform: none; 
            letter-spacing: 0;
        }

        .sub-header-line {
            font-family: var(--secondary-font);
            font-size: 1.1rem;
            color: #222;
            text-align: left;
            margin-bottom: 35px; 
            margin-top: 0;
            line-height: 1.6;
        }

        .sub-header-line.spaced-block {
            margin-bottom: 45px; 
        }

        h3.section-title {
            font-family: var(--primary-font);
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: none; 
            margin-top: 0;
            margin-bottom: 8px;
        }

        /* Clean black thin line pin drop icon layout */
        .location-block-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .pin-drop-icon {
            width: 12px;
            height: 12px;
            border: 2px solid #111111;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: inline-block;
            margin-top: 6px; /* Positions perfectly with the text row */
            flex-shrink: 0;
        }
        .pin-drop-icon::after {
            content: '';
            width: 4px;
            height: 4px;
            background: #111111;
            position: absolute;
            border-radius: 50%;
            top: 4px;
            left: 4px;
        }

        p {
            font-family: var(--secondary-font);
            font-size: 1.05rem;
            line-height: 1.6;
            color: #222;
            margin-bottom: 25px;
        }

        .input-group {
            margin: 25px 0;
            text-align: left;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: var(--border-thick);
            border-radius: 0px;
            font-size: 1rem;
            box-sizing: border-box;
            font-family: var(--primary-font);
            text-transform: none; 
            letter-spacing: 0em;
        }

        input[type="text"]:focus {
            outline: none;
            background-color: #fdfdfd;
        }

        .btn-center-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 20px;
        }

        button.action-btn {
            background-color: #111111;
            color: #ffffff;
            border: var(--border-thick);
            border-radius: 0px;
            padding: 12px 35px; 
            font-size: 0.95rem;
            font-weight: 700;
            font-family: var(--primary-font);
            cursor: pointer;
            width: auto; 
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button.action-btn.lowercase {
            text-transform: lowercase;
        }

        button.action-btn:hover {
            background-color: #222222;
        }

        button.action-btn:active {
            transform: translate(2px, 2px);
        }

        .hidden {
            display: none !important;
        }

        /* Cleaned Error Message: No box background, text turns red */
        .error-msg {
            font-family: var(--primary-font);
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 700;
            color: #d93025; /* Warning Red */
            padding: 0;
            margin-top: 20px;
            letter-spacing: 0.05em;
            text-align: center;
        }

        /* --- RSVP GUEST ROWS STYLING --- */
        .guest-row {
            padding: 22px 0;
            text-align: left;
        }
        .guest-row:first-child {
            border-top: var(--border-thick); 
        }

        .guest-name {
            font-family: var(--primary-font);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 1.05rem;
            margin-bottom: 12px;
            letter-spacing: 0.03em;
        }

        .radio-group {
            display: flex;
            flex-direction: column; 
            gap: 12px;
        }

        .radio-group label {
            font-family: var(--secondary-font);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radio-group input[type="radio"] {
            accent-color: #111111;
            transform: scale(1.1);
        }

        /* --- DETAILS DISPLAY PANEL --- */
        .details-section {
            text-align: left;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px dashed #111111;
        }

        .details-section:first-of-type {
            border-top: none;
            padding-top: 0;
        }

        .arrival-alert {
            font-family: var(--primary-font);
            font-weight: 700;
            font-size: 1.1rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 35px 0;
            color: #111111;
        }
    </style>
</head>
<body>

<div class="header-container">
    <div class="header-side header-side-left">
        <div class="main-txt">The Proposal</div>
        <div class="sub-txt">Afters</div>
    </div>
    
    <div class="logo-center">
        <img src="SF-AM_Vert_Transparent.png" alt="SF-AM Logo">
    </div>
    
    <div class="header-side header-side-right">
        <div class="main-txt">Sat, Aug 8th</div>
        <div class="sub-txt">6:00 PM</div>
    </div>
</div>

<div class="hinge-container">

        </div>
        <div class="btn-center-wrapper">
            <button class="action-btn lowercase" onclick="findInvitation()">search</button>
